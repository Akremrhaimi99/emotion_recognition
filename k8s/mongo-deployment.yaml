apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6.0
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db         # Où MongoDB stocke les données dans le conteneur
      volumes:
      - name: mongo-data
        emptyDir: {}                   # Mémoire temporaire : les données disparaissent si le pod redémarre
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
spec:
  selector:
    app: mongo
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
  type: ClusterIP                     # MongoDB n’est pas exposé à l’extérieur, seulement pour FastAPI
